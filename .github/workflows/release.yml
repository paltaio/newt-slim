name: release

on:
  schedule:
    # Daily, off-peak.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream fosrl/newt tag to build (leave blank to pick the newest)"
        required: false
        type: string
      force:
        description: "Rebuild even if a release already exists"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  UPSTREAM_REPO: fosrl/newt
  RELEASE_SUFFIX: "+min"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      upstream_tag: ${{ steps.pick.outputs.upstream_tag }}
      release_tag:  ${{ steps.pick.outputs.release_tag }}
      proceed:      ${{ steps.pick.outputs.proceed }}
    steps:
      - name: Pick upstream tag
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.upstream_tag }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_TAG" ]; then
            UPSTREAM_TAG="$INPUT_TAG"
          else
            UPSTREAM_TAG="$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq '.tag_name')"
          fi
          if [ -z "$UPSTREAM_TAG" ] || [ "$UPSTREAM_TAG" = "null" ]; then
            echo "No upstream tag resolved" >&2
            exit 1
          fi
          RELEASE_TAG="${UPSTREAM_TAG}${RELEASE_SUFFIX}"

          PROCEED=true
          if [ "$FORCE" != "true" ]; then
            if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $RELEASE_TAG already exists, skipping"
              PROCEED=false
            fi
          fi
          {
            echo "upstream_tag=$UPSTREAM_TAG"
            echo "release_tag=$RELEASE_TAG"
            echo "proceed=$PROCEED"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    if: needs.discover.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64,   suffix: linux-amd64 }
          - { goos: linux, goarch: arm64,   suffix: linux-arm64 }
          - { goos: linux, goarch: arm,     goarm: "7", suffix: linux-armv7 }
          - { goos: linux, goarch: arm,     goarm: "6", suffix: linux-armv6 }
          - { goos: linux, goarch: mipsle,  gomips: softfloat, suffix: linux-mipsle-softfloat }
          - { goos: linux, goarch: mips,    gomips: softfloat, suffix: linux-mips-softfloat }
          - { goos: linux, goarch: riscv64, suffix: linux-riscv64 }
    env:
      UPSTREAM_TAG: ${{ needs.discover.outputs.upstream_tag }}
    steps:
      - name: Checkout newt-slim (patches)
        uses: actions/checkout@v6
        with:
          path: slim

      - name: Clone upstream at tag
        run: |
          set -euo pipefail
          git clone --depth=1 --branch "$UPSTREAM_TAG" \
            "https://github.com/${UPSTREAM_REPO}.git" upstream

      - name: Apply patches
        working-directory: upstream
        run: |
          set -euo pipefail
          # Identity required by git am.
          git -c user.email=bot@local -c user.name=newt-slim \
            am --3way ../slim/patches/*.patch

      - name: Set up Go (from upstream .go-version)
        uses: actions/setup-go@v6
        with:
          go-version-file: upstream/.go-version
          cache-dependency-path: upstream/go.sum

      - name: Install UPX
        env:
          UPX_VERSION: "5.0.1"
        run: |
          set -euo pipefail
          curl -fsSL -o upx.tar.xz \
            "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz"
          tar -xJf upx.tar.xz
          sudo install -m 0755 "upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/upx
          upx --version | head -1

      - name: Build minimal binary
        working-directory: upstream
        env:
          CGO_ENABLED: "0"
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM:  ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          set -euo pipefail
          mkdir -p ../out
          BASE="newt-${UPSTREAM_TAG}-min-${{ matrix.suffix }}"
          go build \
            -tags=minimal \
            -trimpath \
            -ldflags "-s -w -buildid= -X main.newtVersion=${UPSTREAM_TAG}+min" \
            -o "../out/${BASE}" .
          if upx --best --lzma -o "../out/${BASE}.upx" "../out/${BASE}"; then
            echo "UPX-compressed ${BASE}.upx"
          else
            echo "::warning::UPX does not support ${{ matrix.suffix }}; shipping stripped binary only"
          fi
          ls -lh ../out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.suffix }}
          path: out/*
          if-no-files-found: error
          retention-days: 7

  docker:
    needs: [discover, build]
    if: needs.discover.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      UPSTREAM_TAG: ${{ needs.discover.outputs.upstream_tag }}
      IMAGE: ghcr.io/${{ github.repository_owner }}/newt-slim
    steps:
      - uses: actions/checkout@v6

      - name: Download matrix artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: bin-*
          merge-multiple: true

      - name: Stage binaries per platform
        run: |
          set -euo pipefail
          T="${UPSTREAM_TAG}"
          install -Dm755 "artifacts/newt-${T}-min-linux-amd64.upx"  bin/linux/amd64/newt
          install -Dm755 "artifacts/newt-${T}-min-linux-arm64.upx"  bin/linux/arm64/newt
          install -Dm755 "artifacts/newt-${T}-min-linux-armv7.upx"  bin/linux/arm/v7/newt
          install -Dm755 "artifacts/newt-${T}-min-linux-armv6.upx"  bin/linux/arm/v6/newt

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: "false"
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:${{ env.UPSTREAM_TAG }}
            ${{ env.IMAGE }}:latest

  publish:
    needs: [discover, build, docker]
    if: needs.discover.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG:  ${{ needs.discover.outputs.release_tag }}
      UPSTREAM_TAG: ${{ needs.discover.outputs.upstream_tag }}
      IMAGE: ghcr.io/${{ github.repository_owner }}/newt-slim
    steps:
      - name: Collect artifacts
        uses: actions/download-artifact@v8
        with:
          path: out
          pattern: bin-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: out
        run: |
          set -euo pipefail
          sha256sum * | tee SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: out
        run: |
          set -euo pipefail
          NOTES="Built from \`${UPSTREAM_REPO}@${UPSTREAM_TAG}\` with the \`minimal\` build tag.

          \`\`\`
          docker pull ${IMAGE}:${UPSTREAM_TAG}
          \`\`\`

          Binaries: \`<name>\` stripped, \`<name>.upx\` UPX-compressed. See \`SHA256SUMS\`."

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --notes "$NOTES"
            gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --clobber *
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "$NOTES" \
              *
          fi
